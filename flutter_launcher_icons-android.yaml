# Android-only icon config used by the Android CI pipeline.
# Run with: dart run flutter_launcher_icons -f flutter_launcher_icons-android
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0a0a1a"
  adaptive_icon_foreground: "assets/images/icon.png"
  web:
    generate: false
