plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.chastech.emojirain"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "com.chastech.emojirain"
        minSdk 21
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
        multiDexEnabled true
    }

    signingConfigs {
        release {
            keyAlias     System.getenv("KEY_ALIAS")     ?: ""
            keyPassword  System.getenv("KEY_PASSWORD")  ?: ""
            storeFile    System.getenv("STORE_FILE") ? file(System.getenv("STORE_FILE")) : null
            storePassword System.getenv("STORE_PASSWORD") ?: ""
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.2"
    implementation "org.jetbrains.kotlin:kotlin-stdlib:2.1.0"
    implementation "androidx.multidex:multidex:2.0.1"

    // ── Unity Ads mediation adapter for AdMob ─────────────────────────────
    // Includes Unity Ads SDK as a transitive dependency (no separate SDK dep needed).
    // Configure mediation in AdMob console: Mediation → Create mediation group
    // → Add Unity Ads as ad source → map placement IDs to your AdMob ad units.
    //
    // Unity Ads placement IDs (from Unity dashboard):
    //   Game ID:      800079040
    //   Rewarded:     Rewarded_Android
    //   Interstitial: Interstitial_Android
    //   Banner:       Banner_Android
    implementation "com.google.ads.mediation:unity:4.12.4.0"
}
