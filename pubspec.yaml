name: emoji_rain
description: Emoji Rain - Focus or Fail. A fast-paced emoji tapping game.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Ads
  google_mobile_ads: ^5.1.0

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Audio
  audioplayers: ^6.1.0

  # Animations
  flutter_animate: ^4.5.0

  # Timezone (required by flutter_local_notifications for scheduled notifs)
  timezone: ^0.9.4

  # Storage
  shared_preferences: ^2.3.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0a0a1a"
  adaptive_icon_foreground: "assets/images/icon.png"
  remove_alpha_ios: true
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
