name: emoji_rain
description: Emoji Rain - Focus or Fail. A fast-paced emoji tapping game.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.2
  google_mobile_ads: ^5.1.0
  flutter_local_notifications: ^17.2.2
  audioplayers: ^6.1.0
  flutter_animate: ^4.5.0
  timezone: ^0.9.4
  shared_preferences: ^2.3.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0a0a1a"
  adaptive_icon_foreground: "assets/images/icon.png"
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
