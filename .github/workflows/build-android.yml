name: Build Emoji Rain (Android + iOS)

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*.*.*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: 'stable'
  JAVA_VERSION:    '17'

# ─────────────────────────────────────────────────────────────────────────────
jobs:

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  ANDROID                                                                 ║
# ╚══════════════════════════════════════════════════════════════════════════╝
  build-android:
    name: 🤖 Android Build
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ──────────────────────────────────────────────────────────────
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      # ── Flutter ───────────────────────────────────────────────────────────
      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter version info
        run: flutter --version

      # ── Dependencies ──────────────────────────────────────────────────────
      - name: Get Flutter packages
        run: flutter pub get

      # ── Launcher icons ────────────────────────────────────────────────────
      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons

      # ── Analyse (optional, non-blocking) ─────────────────────────────────
      - name: Analyse project
        run: flutter analyze --no-fatal-warnings || true

      # ── Keystore setup (release only) ─────────────────────────────────────
      - name: Decode keystore
        if: github.event_name != 'pull_request'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
            echo "STORE_FILE=$(pwd)/android/app/release.jks" >> $GITHUB_ENV
          fi

      # ── Build APK (debug — always) ────────────────────────────────────────
      - name: Build debug APK
        run: flutter build apk --debug

      # ── Build APKs (release — universal + per-ABI) ────────────────────────
      - name: Build release APKs
        if: github.event_name != 'pull_request'
        env:
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          # Universal APK (works on all devices, good for direct installs)
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/emoji-rain-universal.apk

          # Split APKs (smaller per-architecture, good for distribution)
          flutter build apk --release --split-per-abi \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}

      # ── Build AAB (release — Google Play) ────────────────────────────────
      - name: Build release AAB (Google Play)
        if: github.event_name != 'pull_request'
        env:
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: emoji-rain-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Upload universal release APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: emoji-rain-universal-apk
          path: build/app/outputs/flutter-apk/emoji-rain-universal.apk
          retention-days: 30

      - name: Upload split release APKs (per ABI)
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: emoji-rain-split-apks
          path: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30

      - name: Upload release AAB
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: emoji-rain-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── GitHub Release (on tag) ───────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/emoji-rain-universal.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/bundle/release/app-release.aab
          name: Emoji Rain ${{ github.ref_name }}
          body: |
            ## 🎮 Emoji Rain ${{ github.ref_name }}

            ### Downloads
            - **Universal APK** — Installs on any Android device
            - **arm64-v8a APK** — Smaller, optimised for modern Android devices
            - **AAB** — Upload to Google Play Console

            ### Changelog
            See commit history for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  iOS                                                                      ║
# ╚══════════════════════════════════════════════════════════════════════════╝
  build-ios:
    name: 🍎 iOS Build
    runs-on: macos-14          # Apple Silicon runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get Flutter packages
        run: flutter pub get

      # ── Regenerate iOS project files (xcodeproj not committed to repo) ────
      - name: Regenerate iOS project
        run: flutter create . --platforms=ios

      # ── Generate icons — Android only from pubspec; iOS via temp config ───
      - name: Generate launcher icons
        run: |
          flutter pub run flutter_launcher_icons
          # Also generate iOS icons now that xcodeproj exists
          cat > /tmp/icons_ios.yaml << 'EOF'
          flutter_launcher_icons:
            ios: true
            image_path: "assets/images/icon.png"
            remove_alpha_ios: true
          EOF
          dart run flutter_launcher_icons -f /tmp/icons_ios.yaml || true

      # ── Install CocoaPods dependencies ────────────────────────────────────
      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
        env:
          LANG: en_US.UTF-8

      # ── Decode provisioning profile & cert (if secrets set) ───────────────
      - name: Import signing certificate
        if: github.event_name != 'pull_request'
        env:
          CERT_BASE64:          ${{ secrets.IOS_CERT_BASE64 }}
          CERT_PASSWORD:        ${{ secrets.IOS_CERT_PASSWORD }}
          PROVISIONING_BASE64:  ${{ secrets.IOS_PROVISIONING_BASE64 }}
        run: |
          if [ -n "$CERT_BASE64" ]; then
            echo "$CERT_BASE64"        | base64 --decode > cert.p12
            echo "$PROVISIONING_BASE64" | base64 --decode > profile.mobileprovision

            security create-keychain -p temp_password build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p temp_password build.keychain
            security set-keychain-settings -t 3600 -u build.keychain

            security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" \
              -T /usr/bin/codesign -T /usr/bin/xcodebuild

            security set-key-partition-list -S apple-tool:,apple: \
              -s -k temp_password build.keychain

            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp profile.mobileprovision \
              ~/Library/MobileDevice/Provisioning\ Profiles/emoji_rain.mobileprovision
          fi

      # ── Build unsigned (no-codesign) for CI without certs ────────────────
      - name: Build iOS (no codesign)
        if: env.IOS_CERT_BASE64 == ''
        run: |
          flutter build ios --release --no-codesign \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}
        env:
          IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}

      # ── Build & export IPA (with certs) ──────────────────────────────────
      - name: Build iOS IPA
        if: github.event_name != 'pull_request' && env.IOS_CERT_BASE64 != ''
        run: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }} \
            --export-options-plist=ios/ExportOptions.plist
        env:
          IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: emoji-rain-ios
          path: |
            build/ios/iphoneos/Runner.app
            build/ios/ipa/*.ipa
          retention-days: 14
