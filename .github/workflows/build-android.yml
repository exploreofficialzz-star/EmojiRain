name: 🤖 Android Build

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (apk | aab | both)'
        required: true
        default: 'both'

env:
  JAVA_VERSION: '17'

jobs:
  # ─────────────────────────────────────────────────────────────
  # Build Android APK + AAB
  # ─────────────────────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # 1. Checkout
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. Java
      - name: ☕ Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      # 3. Flutter
      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 4. Dependencies
      - name: 📦 Install dependencies
        run: flutter pub get

      # 5. Generate launcher icons (ios: false set in pubspec.yaml — Android only)
      - name: 🎨 Generate launcher icons
        run: |
          set -e
          dart run flutter_launcher_icons
          echo "✅ Mipmap resources generated"

      # 6. Decode keystore (if secrets are available)
      - name: 🔑 Decode keystore
        if: ${{ env.KEY_JKS != '' }}
        env:
          KEY_JKS: ${{ secrets.KEY_JKS }}
        run: |
          echo "$KEY_JKS" | base64 --decode > android/app/release.jks
          echo "STORE_FILE=$GITHUB_WORKSPACE/android/app/release.jks" >> $GITHUB_ENV
        shell: bash

      # 7. Build APK (debug if no signing, release if signed)
      - name: 🔨 Build APK
        if: ${{ github.event.inputs.build_type != 'aab' }}
        env:
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:  ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEY_ALIAS" ] && [ -f "android/app/release.jks" ]; then
            flutter build apk --release --split-per-abi
          else
            flutter build apk --debug
          fi

      # 8. Build AAB
      - name: 🔨 Build App Bundle (AAB)
        if: ${{ github.event.inputs.build_type != 'apk' }}
        env:
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:  ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEY_ALIAS" ] && [ -f "android/app/release.jks" ]; then
            flutter build appbundle --release
          else
            flutter build appbundle --debug
          fi

      # 9. Upload APKs
      - name: 📤 Upload APK artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-apks-${{ github.sha }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 14

      # 10. Upload AAB
      - name: 📤 Upload AAB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.sha }}
          path: build/app/outputs/bundle/**/*.aab
          if-no-files-found: warn
          retention-days: 14

      # 11. Create Release (on tag push)
      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/**/*.aab
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
